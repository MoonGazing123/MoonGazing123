<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>实用工具 - 个人资源主页</title>
<link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root {--bg:#121212;--card:#1a1a1a;--nav:#181818;--text:#eaeaea;--gray:#999;--primary:#5578ff;--border:#333;--hover:#252525;}
* {margin:0;padding:0;box-sizing:border-box;font-family:Segoe UI,Microsoft YaHei,sans-serif;}
body {background:var(--bg);color:var(--text);}
.navbar {position:fixed;top:0;left:0;width:100%;height:60px;background:var(--nav);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 24px;z-index:999;}
.logo {font-size:18px;font-weight:bold;color:var(--primary);display:flex;align-items:center;gap:8px;}
.nav-menu {display:flex;gap:6px;}
.nav-item {padding:8px 14px;border-radius:6px;color:var(--text);text-decoration:none;font-size:14px;}
.nav-item:hover,.nav-item.active {background:var(--hover);}
.login-btn {padding:6px 14px;background:var(--primary);color:#fff;border:none;border-radius:6px;cursor:pointer;}
.container {max-width:1200px;margin:100px auto 60px;padding:0 20px;}
.page-title {font-size:24px;margin-bottom:24px;display:flex;align-items:center;gap:10px;}
.section-label {color:var(--gray);margin:20px 0 12px;font-size:15px;}
.wrap {display:flex;flex-wrap:wrap;gap:16px;margin-bottom:24px;}
.tool-box {background:var(--card);border:1px solid var(--border);border-radius:12px;padding:22px;flex:1;min-width:190px;text-align:center;cursor:pointer;}
.tool-box i {font-size:22px;color:var(--primary);margin-bottom:10px;}
.tool-box:hover {border-color:var(--primary);}
.footer {background:var(--nav);border-top:1px solid var(--border);padding:30px 20px;text-align:center;color:var(--gray);}
</style>
</head>
<body>
<div class="navbar">
  <div class="logo"><i class="fas fa-star"></i> 个人资源主页</div>
  <div class="nav-menu">
    <a href="index.html" class="nav-item">首页</a>
    <a href="download.html" class="nav-item">资源下载</a>
    <a href="tools.html" class="nav-item active">实用工具</a>
    <a href="docs.html" class="nav-item">个人文档</a>
    <a href="user.html" class="nav-item">个人中心</a>
  </div>
  <div class="login-btn" onclick="location.href='user.html'">登录</div>
</div>

<div class="container">
  <h1 class="page-title"><i class="fas fa-wrench"></i> 实用工具合集</h1>

  <div class="section-label">日常实用</div>
  <div class="wrap">
    <div class="tool-box" onclick="alert('计算器')"><i class="fas fa-calculator"></i><div>计算器</div></div>
    <div class="tool-box" onclick="alert('待办清单')"><i class="fas fa-list-check"></i><div>待办清单</div></div>
    <div class="tool-box" onclick="alert('全屏时钟')"><i class="fas fa-clock"></i><div>全屏时钟</div></div>
    <div class="tool-box" onclick="alert('单位转换')"><i class="fas fa-ruler-combined"></i><div>单位转换</div></div>
  </div>

  <div class="section-label">图文工具</div>
  <div class="wrap">
    <div class="tool-box" onclick="alert('简易画板')"><i class="fas fa-paint-brush"></i><div>简易画板</div></div>
    <div class="tool-box" onclick="alert('二维码生成')"><i class="fas fa-qrcode"></i><div>二维码生成</div></div>
    <div class="tool-box" onclick="alert('图片压缩')"><i class="fas fa-compress"></i><div>图片压缩</div></div>
    <div class="tool-box" onclick="alert('文字提取')"><i class="fas fa-file-text"></i><div>文字提取</div></div>
  </div>

  <div class="section-label">编程效率</div>
  <div class="wrap">
    <div class="tool-box" onclick="alert('JSON格式化')"><i class="fas fa-code"></i><div>JSON格式化</div></div>
    <div class="tool-box" onclick="alert('代码MD5加密')"><i class="fas fa-lock"></i><div>MD5加密</div></div>
    <div class="tool-box" onclick="alert('URL编解码')"><i class="fas="fa-link"></i><div>URL编解码</div></div>
    <div class="tool-box" onclick="alert('时间戳转换')"><i class="fas="fa-calendar"></i><div>时间戳转换</div></div>
  </div>

  <div class="section-label">趣味娱乐</div>
  <div class="wrap">
    <div class="tool-box" onclick="alert('随机笑话')"><i class="fas fa-laugh"></i><div>随机笑话</div></div>
    <div class="tool-box" onclick="alert('土味情话')"><i class="fas fa-heart"></i><div>土味情话</div></div>
    <div class="tool-box" onclick="alert('随机起名')"><i class="fas fa-user"></i><div>随机起名</div></div>
    <div class="tool-box" onclick="alert('掷骰子')"><i class="fas fa-dice"></i><div>掷骰子</div></div>
  </div>

  <div style="background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;margin-top:30px;">
    <h3 style="margin-bottom:10px;">工具说明</h3>
    <p style="color:var(--gray);line-height:1.6;">
      本站所有工具均免费使用，无需下载安装，打开即用。
      工具会持续更新，如果你有想要的工具，可以联系站长添加。
      工具仅用于学习与日常便捷使用，请勿用于非法用途。
    </p>
  </div>
</div>

<div class="footer">© 2026 个人资源主页</div>
</body>
</html>
