<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DLRS论坛区 - 望月论坛</title>
<link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root {--bg:#181818;--card:#222;--nav:#1e1e1e;--text:#eaeaea;--gray:#999;--primary:#6a85ff;--border:#333;--hover:#2a2a2a;}
* {margin:0;padding:0;box-sizing:border-box;font-family:"Segoe UI","Microsoft YaHei",sans-serif;}
body {background:var(--bg);color:var(--text);display:flex;}
.sidebar {width:220px;background:var(--nav);height:100vh;position:fixed;padding:20px 0;border-right:1px solid var(--border);}
.logo {font-size:24px;font-weight:bold;color:var(--primary);padding:0 20px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;}
.nav-list {margin-top:20px;}
.nav-item {display:flex;align-items:center;gap:12px;padding:12px 20px;color:var(--text);text-decoration:none;font-size:15px;transition:all 0.2s ease;}
.nav-item:hover,.nav-item.active {background:var(--hover);color:var(--primary);}
.main {margin-left:220px;width:100%;padding:30px;}
.section-title {font-size:18px;margin-bottom:20px;display:flex;justify-content:space-between;align-items:center;}
.post-btn {padding:8px 16px;background:var(--primary);color:#fff;border:none;border-radius:6px;cursor:pointer;}
.panel {background:var(--card);border-radius:10px;border:1px solid var(--border);padding:20px;margin-bottom:20px;}
.post-title {font-size:16px;margin-bottom:8px;}
.post-meta {font-size:13px;color:var(--gray);margin-bottom:12px;}
.post-content {color:var(--gray);line-height:1.6;}
.footer {margin-top:40px;text-align:center;color:var(--gray);font-size:14px;}
</style>
</head>
<body>
<div class="sidebar">
  <div class="logo"><i class="fas fa-moon"></i> 望月论坛</div>
  <div class="nav-list">
    <a href="index.html" class="nav-item"><i class="fas fa-home"></i> 首页</a>
    <a href="mc.html" class="nav-item"><i class="fas fa-cube"></i> MC论坛区</a>
    <a href="dlrs.html" class="nav-item active"><i class="fas fa-music"></i> DLRS论坛区</a>
    <a href="download.html" class="nav-item"><i class="fas fa-download"></i> 资源下载</a>
    <a href="docs.html" class="nav-item"><i class="fas fa-file-alt"></i> 文档中心</a>
    <a href="user.html" class="nav-item"><i class="fas fa-user"></i> 个人中心</a>
  </div>
</div>

<div class="main">
  <div class="section-title">
    <span>DLRS论坛区</span>
    <button class="post-btn" onclick="alert('发帖功能开发中')">发布新帖</button>
  </div>

  <div class="panel">
    <div class="post-title">【必看】DLRS论坛发帖规范</div>
    <div class="post-meta">站长 · 2026-05-23</div>
    <div class="post-content">
      <p>1. 饭制作品分享请附上下载链接和说明。</p>
      <p>2. 关卡讨论请文明交流，禁止踩一捧一。</p>
      <p>3. 禁止发布盗版、破解、外挂相关内容。</p>
      <p>4. 求助帖请说明问题细节，方便他人解答。</p>
      <p>5. 优质饭制会加精置顶，优先推荐。</p>
    </div>
  </div>

  <div class="panel">
    <div class="post-title">讨论：你最喜欢的饭制关卡是？</div>
    <div class="post-meta">玩家 · 2026-05-21</div>
    <div class="post-content">一起来聊聊你心中最棒的舞线饭制！</div>
  </div>

  <div class="footer">© 2026 望月论坛 | MC与DLRS同好交流社区</div>
</div>
</body>
</html>
