<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>个人中心 - 个人资源主页</title>
<link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root {--bg:#121212;--card:#1a1a1a;--nav:#181818;--text:#eaeaea;--gray:#999;--primary:#5578ff;--border:#333;--hover:#252525;}
* {margin:0;padding:0;box-sizing:border-box;font-family:Segoe UI,Microsoft YaHei,sans-serif;}
body {background:var(--bg);color:var(--text);}
.navbar {position:fixed;top:0;left:0;width:100%;height:60px;background:var(--nav);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 24px;z-index:999;}
.logo {font-size:18px;font-weight:bold;color:var(--primary);display:flex;align-items:center;gap:8px;}
.nav-menu {display:flex;gap:6px;}
.nav-item {padding:8px 14px;border-radius:6px;color:var(--text);text-decoration:none;font-size:14px;}
.nav-item:hover,.nav-item.active {background:var(--hover);}
.container {max-width:1200px;margin:100px auto 60px;padding:0 20px;}
.box {background:var(--card);border:1px solid var(--border);border-radius:12px;padding:30px;max-width:460px;margin:0 auto;}
.title {font-size:22px;margin-bottom:20px;text-align:center;}
input {width:100%;padding:12px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);margin-bottom:14px;outline:none;}
.btn {width:100%;padding:12px;background:var(--primary);color:#fff;border:none;border-radius:6px;cursor:pointer;margin-bottom:10px;}
.btn-secondary {background:#444;}
.info {text-align:center;color:var(--gray);margin-top:10px;line-height:1.6;}
.footer {background:var(--nav);border-top:1px solid var(--border);padding:30px 20px;text-align:center;color:var(--gray);}
</style>
</head>
<body>
<div class="navbar">
  <div class="logo"><i class="fas fa-star"></i> 个人资源主页</div>
  <div class="nav-menu">
    <a href="index.html" class="nav-item">首页</a>
    <a href="download.html" class="nav-item">资源下载</a>
    <a href="tools.html" class="nav-item">实用工具</a>
    <a href="docs.html" class="nav-item">个人文档</a>
    <a href="user.html" class="nav-item active">个人中心</a>
  </div>
</div>

<div class="container">
  <div class="box" id="box">
    <div class="title">用户中心</div>
    <input type="text" id="user" placeholder="请输入用户名">
    <input type="password" id="pwd" placeholder="请输入密码">
    <button class="btn" onclick="login()">登录</button>
    <button class="btn btn-secondary" onclick="reg()">注册</button>
    <div class="info">账号信息仅保存在本地浏览器<br>清除缓存会丢失，请记住账号密码</div>
  </div>
</div>

<div class="footer">© 2026 个人资源主页</div>

<script>
function $(id){return document.getElementById(id)}
function login(){
  let u = $('user').value;
  let p = $('pwd').value;
  if(localStorage.getItem('user')===u&&localStorage.getItem('pwd')===p){
    localStorage.setItem('login','1');
    alert('登录成功！');
    location.reload();
  }else{alert('用户名或密码错误');}
}
function reg(){
  let u = $('user').value;
  let p = $('pwd').value;
  if(u&&p){localStorage.setItem('user',u);localStorage.setItem('pwd',p);alert('注册成功！请登录');}
  else{alert('请输入完整信息');}
}
window.onload=function(){
  if(localStorage.getItem('login')==='1'){
    $('box').innerHTML=`
      <div class="title">欢迎回来</div>
      <p style="text-align:center;margin-bottom:20px;">用户：${localStorage.getItem('user')}</p>
      <button class="btn" onclick="logout()">退出登录</button>
      <div class="info" style="margin-top:20px;">登录状态已保持<br>可正常使用全站功能</div>
    `;
  }
}
function logout(){localStorage.removeItem('login');alert('已退出登录');location.reload();}
</script>
</body>
</html>
