<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的个人主页</title>
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            transition: all 0.3s ease;
        }
        :root {
            --bg-color: #f5f7fa;
            --card-bg: #ffffff;
            --text-color: #2d3748;
            --secondary-text: #718096;
            --primary-color: #4f46e5;
            --hover-color: #4338ca;
            --shadow: 0 10px 30px rgba(0, 0, 0.1);
            --border-color: #e2e8f0;
        }
        [data-theme="dark"] {
            --bg-color: #121826;
            --card-bg: #1e293b;
            --text-color: #f1f5f9;
            --secondary-text: #94a3b8;
            --primary-color: #6366f1;
            --hover-color: #4f46e5;
            --shadow: 0 10px 30px rgba(0, 0, 0.3);
            --border-color: #334155;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            padding: 2rem 1rem;
            line-height: 1.6;
        }
        .container {max-width: 1000px;margin: 0 auto;}
        .header {display: flex;justify-content: space-between;align-items: center;margin-bottom: 3rem;padding-bottom: 1rem;border-bottom: 1px solid var(--border-color);}
        .logo {font-size: 1.5rem;font-weight: bold;color: var(--primary-color);}
        .time-show {font-size: 1rem;color: var(--secondary-text);margin-right: 1rem;}
        .theme-toggle {background: var(--card-bg);border: none;width: 45px;height: 45px;border-radius: 50%;display: flex;align-items: center;justify-content: center;cursor: pointer;box-shadow: var(--shadow);color: var(--text-color);font-size: 1.2rem;}
        .theme-toggle:hover {transform: scale(1.05);}
        .card {background: var(--card-bg);border-radius: 16px;padding: 2rem;margin-bottom: 2rem;box-shadow: var(--shadow);border: 1px solid var(--border-color);}
        .card-title {font-size: 1.3rem;margin-bottom: 1.5rem;display: flex;align-items: center;gap: 0.8rem;color: var(--primary-color);}
        .qq-box {display: flex;align-items: center;gap: 1.5rem;flex-wrap: wrap;}
        .qq-icon {width: 60px;height: 60px;background: #12b7f5;border-radius: 50%;display: flex;align-items: center;justify-content: center;color: white;font-size: 1.8rem;}
        .qq-info h3 {margin-bottom: 0.3rem;}
        .qq-info p {color: var(--secondary-text);}
        .email-text{color:#12b7f5;font-weight:500;margin-top:6px;}
        .qq-btn {margin-left: auto;background: #12b7f5;color: white;border: none;padding: 0.8rem 1.5rem;border-radius: 8px;font-weight: bold;cursor: pointer;text-decoration: none;display: inline-flex;align-items: center;gap: 0.5rem;}
        .qq-btn:hover {background: #0ea8e0;transform: translateY(-2px);}
        .file-list {display: grid;grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));gap: 1.2rem;}
        .file-item {border: 1px solid var(--border-color);border-radius: 12px;padding: 1.2rem;display: flex;flex-direction: column;gap: 1rem;}
        .file-header {display: flex;align-items: center;gap: 1rem;}
        .file-icon {width: 40px;height: 40px;background: var(--primary-color);border-radius: 8px;display: flex;align-items: center;justify-content: center;color: white;}
        .file-name {font-weight: 500;}
        .download-btn {background: var(--primary-color);color: white;border: none;padding: 0.7rem;border-radius: 8px;cursor: pointer;font-weight: 500;display: flex;align-items: center;justify-content: center;gap: 0.5rem;text-decoration: none;}
        .download-btn:hover {background: var(--hover-color);}
        .nav-list {display: flex;flex-wrap: wrap;gap: 1rem;}
        .nav-item {padding: 0.6rem 1.2rem;border-radius: 8px;background: var(--border-color);text-decoration: none;color: var(--text-color);}
        .nav-item:hover {background: var(--primary-color);color: #fff;}
        .visit-box {text-align: center;padding: 1rem 0;font-size: 1.1rem;}
        .intro-text {line-height: 1.8;color: var(--secondary-text);}
        .footer {text-align: center;margin-top: 4rem;color: var(--secondary-text);font-size: 0.9rem;}
        @media (max-width: 600px) {
            .qq-box {flex-direction: column;align-items: flex-start;gap: 1rem;}
            .qq-btn {margin-left: 0;width: 100%;justify-content: center;}
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">
                <i class="fas fa-user-circle"></i> 我的个人主页
            </div>
            <div style="display:flex;align-items:center;">
                <span class="time-show" id="nowTime"></span>
                <button id="themeBtn" class="theme-toggle">
                    <i class="fas fa-moon"></i>
                </button>
            </div>
        </div>

        <!-- 个人简介 -->
        <div class="card">
            <h2 class="card-title"><i class="fas fa-user"></i> 个人简介</h2>
            <p class="intro-text">
                欢迎来到我的专属个人主页！我就是我，没啥可说
            </p>
        </div>

        <!-- 访客统计 -->
        <div class="card visit-box">
            <i class="fas fa-eye"></i> 本站累计访问人数：<span id="visitNum">1896</span> 人
        </div>

        <!-- 联系方式 -->
        <div class="card">
            <h2 class="card-title"><i class="fab fa-qq"></i> 联系方式</h2>
            <div class="qq-box">
                <div class="qq-icon">
                    <i class="fab fa-qq"></i>
                </div>
                <div class="qq-info">
                    <h3>QQ在线聊天</h3>
                    <p>QQ号码：3885710744</p>
                    <p class="email-text">联系邮箱：moongazing123123@qq.com</p>
                </div>
                <a href="tencent://message/?uin=3885710744&Site=qq&Menu=yes" class="qq-btn" target="_blank">
                    <i class="fas fa-comments"></i> 立即私聊
                </a>
            </div>
        </div>

        <!-- 快捷导航 -->
        <div class="card">
            <h2 class="card-title"><i class="fas fa-compass"></i> 快捷导航</h2>
            <div class="nav-list">
                <a href="https://www.baidu.com" class="nav-item" target="_blank">百度搜索</a>
                <a href="https://pan.quark.cn" class="nav-item" target="_blank">夸克网盘</a>
                <a href="https://mail.qq.com" class="nav-item" target="_blank">QQ邮箱</a>
                <a href="#" class="nav-item">趣味小工具</a>
                <a href="#" class="nav-item">资源合集</a>
            </div>
        </div>

        <!-- 文件下载 -->
        <div class="card">
            <h2 class="card-title"><i class="fas fa-download"></i> 资源下载</h2>
            <div class="file-list">
                <div class="file-item">
                    <div class="file-header">
                        <div class="file-icon">
                            <i class="fas fa-file-zip"></i>
                        </div>
                        <div class="file-name">作废的饭制</div>
                    </div>
                    <a href="https://pan.quark.cn/s/944e53999c19?pwd=1yKg" class="download-btn" target="_blank">
                        <i class="fas fa-download"></i> 前往下载
                    </a>
                </div>
                <div class="file-item">
                    <div class="file-header">
                        <div class="file-icon">
                            <i class="fas fa-file-code"></i>
                        </div>
                        <div class="file-name">作废的饭制</div>
                    </div>
                    <a href="https://pan.quark.cn/s/944e53999c19?pwd=1yKg" class="download-btn" target="_blank">
                        <i class="fas fa-download"></i> 前往下载
                    </a>
                </div>
                <div class="file-item">
                    <div class="file-header">
                        <div class="file-icon">
                            <i class="fas fa-file-image"></i>
                        </div>
                        <div class="file-name">作废的饭制</div>
                    </div>
                    <a href="https://pan.quark.cn/s/944e53999c19?pwd=1yKg" class="download-btn" target="_blank">
                        <i class="fas fa-download"></i> 前往下载
                    </a>
                </div>
            </div>
        </div>

        <!-- 留言提示 -->
        <div class="card">
            <h2 class="card-title"><i class="fas fa-comment-dots"></i> 留言须知</h2>
            <p class="intro-text">
                有资源需求、问题咨询或者建议想法，均可直接添加QQ联系我，看到消息会第一时间回复大家！
            </p>
        </div>

        <div class="footer">
            © 2026 个人专属主页 | 昼夜模式自由切换
        </div>
    </div>

    <script>
        // 实时时钟
        function getTime(){
            let d=new Date();
            let h=d.getHours(),m=d.getMinutes(),s=d.getSeconds();
            h=h<10?'0'+h:h;
            m=m<10?'0'+m:m;
            s=s<10?'0'+s:s;
            document.getElementById('nowTime').innerText=h+":"+m+":"+s;
        }
        setInterval(getTime,1000);
        getTime();

        // 深浅色切换
        const themeBtn = document.getElementById('themeBtn');
        const html = document.documentElement;
        const savedTheme = localStorage.getItem('theme') || 'light';
        html.setAttribute('data-theme', savedTheme);
        function updateIcon(t){themeBtn.innerHTML=t==='dark'?'<i class="fas fa-sun"></i>':'<i class="fas fa-moon"></i>';}
        updateIcon(savedTheme);
        themeBtn.addEventListener('click',()=>{
            let n=html.getAttribute('data-theme')==='dark'?'light':'dark';
            html.setAttribute('data-theme',n);
            localStorage.setItem('theme',n);
            updateIcon(n);
        });
    </script>
</body>
</html>
