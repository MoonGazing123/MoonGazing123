<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>望月论坛 - MC & DLRS 交流社区</title>
<link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Segoe UI", "Microsoft YaHei", sans-serif;
}
:root {
    --bg: #121212;
    --nav: #1a1a1a;
    --card: #1e1e1e;
    --border: #333;
    --text: #f0f0f0;
    --gray: #999;
    --main: #7a94ff;
    --glow: rgba(122, 148, 255, 0.15);
}
body {
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
}
/* 导航 */
.nav {
    background: var(--nav);
    border-bottom: 1px solid var(--border);
    padding: 16px 0;
    position: sticky;
    top: 0;
    z-index: 99;
}
.container {
    max-width: 1100px;
    margin: 0 auto;
    padding: 0 20px;
}
.nav-inner {
    display: flex;
    justify-content: space-between;
    align-items: center;
}
.logo {
    font-size: 22px;
    font-weight: bold;
    color: var(--main);
    display: flex;
    align-items: center;
    gap: 8px;
}
.menu {
    display: flex;
    gap: 24px;
}
.menu a {
    color: var(--text);
    text-decoration: none;
    font-size: 15px;
    transition: 0.2s;
}
.menu a:hover {
    color: var(--main);
}
.login {
    padding: 6px 14px;
    border: 1px solid var(--main);
    color: var(--main);
    border-radius: 6px;
    text-decoration: none;
    font-size: 14px;
    transition: 0.2s;
}
.login:hover {
    background: var(--main);
    color: #fff;
}
/* 头部横幅 */
.hero {
    padding: 60px 0;
    text-align: center;
    background: linear-gradient(to bottom, #151525, #121212);
    border-bottom: 1px solid var(--border);
}
.hero h1 {
    font-size: 36px;
    margin-bottom: 10px;
}
.hero p {
    color: var(--gray);
    max-width: 600px;
    margin: 0 auto;
}
/* 板块区 */
.sections {
    padding: 40px 0;
}
.title {
    font-size: 20px;
    margin-bottom: 20px;
    padding-left: 6px;
    border-left: 3px solid var(--main);
}
.grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 20px;
}
.card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 24px;
    transition: 0.3s;
}
.card:hover {
    transform: translateY(-3px);
    border-color: var(--main);
    box-shadow: 0 8px 20px var(--glow);
}
.card h3 {
    font-size: 18px;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 8px;
}
.card p {
    color: var(--gray);
    font-size: 14px;
}
/* 资源区 */
.res {
    padding: 20px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    margin-top: 10px;
}
.res h4 {
    margin-bottom: 10px;
}
.res p {
    color: var(--gray);
    font-size: 13px;
}
/* 页脚 */
.footer {
    background: var(--nav);
    border-top: 1px solid var(--border);
    padding: 30px 0;
    text-align: center;
    color: var(--gray);
    font-size: 14px;
    margin-top: 40px;
}
</style>
</head>
<body>

<div class="nav">
    <div class="container nav-inner">
        <div class="logo"><i class="fas fa-moon"></i> 望月论坛</div>
        <div class="menu">
            <a href="index.html">首页</a>
            <a href="mc.html">MC社区</a>
            <a href="dlrs.html">DLRS社区</a>
            <a href="download.html">资源下载</a>
            <a href="docs.html">帮助说明</a>
        </div>
        <a href="user.html" class="login">登录 / 注册</a>
    </div>
</div>

<div class="hero">
    <div class="container">
        <h1>欢迎来到望月论坛</h1>
        <p>MC 与 DLRS 玩家交流、资源分享、作品展示的纯净社区，免费、开放、无广告</p>
    </div>
</div>

<div class="container sections">
    <h2 class="title">论坛板块</h2>
    <div class="grid">
        <div class="card">
            <h3><i class="fas fa-cube" style="color:#74cc7a"></i> MC 交流社区</h3>
            <p>服务器、模组、整合包、建筑、红石、生存问答</p>
        </div>
        <div class="card">
            <h3><i class="fas fa-music" style="color:#ff9870"></i> DLRS 饭制社区</h3>
            <p>跳舞的线饭制作品分享、关卡交流、技术讨论</p>
        </div>
    </div>

    <h2 class="title" style="margin-top:40px">资源下载</h2>
    <div class="res">
        <h4>热门资源免费下载</h4>
        <p>包含 MC 模组、DLRS 饭制、学习资料、工具合集，全部免费分享</p>
    </div>
</div>

<div class="footer">
    <div class="container">
        © 2026 望月论坛 | 纯原创设计 禁止抄袭
    </div>
</div>

</body>
</html>
